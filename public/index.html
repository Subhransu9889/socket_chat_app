<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEBSOCKET CHAT</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #1a1a2e;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .chat-container {
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: #16213e;
        }

        .chat-header {
            padding: 20px;
            background: #0f3460;
            color: white;
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            border-bottom: 1px solid #e94560;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .message.sent {
            align-self: flex-end;
            background: #e94560;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.received {
            align-self: flex-start;
            background: #1a1a2e;
            color: #eaeaea;
            border-bottom-left-radius: 4px;
        }

        .message .sender {
            font-size: 0.75rem;
            opacity: 0.7;
            margin-bottom: 4px;
        }

        .input-area {
            padding: 20px;
            background: #0f3460;
            display: flex;
            gap: 12px;
        }

        .input-area input {
            flex: 1;
            padding: 14px 18px;
            border: none;
            border-radius: 25px;
            background: #1a1a2e;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        .input-area input::placeholder {
            color: #6c757d;
        }

        .input-area button {
            padding: 14px 28px;
            border: none;
            border-radius: 25px;
            background: #e94560;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .input-area button:hover {
            background: #c73e54;
        }

        .typing-indicator {
            padding: 8px 20px;
            font-size: 0.85rem;
            color: #6c757d;
            font-style: italic;
            display: none;
        }

        .typing-indicator.visible {
            display: block;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">💬 WebSocket Chat</div>
        <div class="messages" id="messages">
            <div class="typing-indicator" id="typingIndicator">Someone is typing...</div>
            <div class="message received">
                <div class="sender">System</div>
                Welcome to the chat! Start typing to connect.
            </div>
        </div>
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Type a message..." autocomplete="off">
            <button id="sendBtn">Send</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const messagesDiv = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const typingIndicator = document.getElementById('typingIndicator');

        // Debounce function
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        // Emit typing event with debounce
        const emitTyping = debounce(() => {
            socket.emit('user:typing');
        }, 300);

        messageInput.addEventListener('input', () => {
            emitTyping();
        });

        function addMessage(text, isSent = true, sender = 'You') {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isSent ? 'sent' : 'received'}`;
            messageDiv.innerHTML = `<div class="sender">${sender}</div>${text}`;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        sendBtn.addEventListener('click', () => {
            const text = messageInput.value.trim();
            if (text) {
                addMessage(text, true);
                messageInput.value = '';
                console.log(text);
                socket.emit('user:message', text);
                
            }
        });
        socket.on('server:message', (msg) => {
            addMessage(msg, false, 'Server');
            console.log('Message from server:', msg);
        });

        socket.on('server:typing', () => {
            typingIndicator.classList.add('visible');
            setTimeout(() => {
                typingIndicator.classList.remove('visible');
            }, 2000);
        });

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendBtn.click();
            }
        });

        // WebSocket connection would go here
        // const ws = new WebSocket('ws://localhost:3000');
    </script>
</body>
</html>
